<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Crash X</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  overflow: hidden;
}

/* HEADER */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: rgba(0,0,0,0.6);
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* GAME AREA */
#game {
  position: relative;
  height: 60vh;
}

canvas {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

#rocket {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  font-size: 40px;
}

#multi {
  text-align: center;
  font-size: 60px;
  margin-top: 10px;
}

/* CONTROL */
#controls {
  text-align: center;
  margin-top: 10px;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

.start { background: #22c55e; }
.cash { background: #f59e0b; }

/* MODAL DEPOSIT */
#depositBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

#depositContent {
  background: #111;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="topbar">
  <div>🚀 Space Crash</div>
  <div>💰 <span id="balance">0</span></div>
  <button onclick="openDeposit()">Deposit</button>
</div>

<h1 id="multi">1.00x</h1>

<!-- GAME -->
<div id="game">
  <canvas id="graph" width="350" height="300"></canvas>
  <div id="rocket">🚀</div>
</div>

<!-- CONTROL -->
<div id="controls">
  <input type="number" id="bet" value="10">
  <input type="number" id="auto" placeholder="Auto cashout">

  <br>

  <button class="start" onclick="startGame()">LAUNCH</button>
  <button class="cash" onclick="cashOut()">CASH OUT</button>

  <h3 id="result"></h3>
</div>

<!-- DEPOSIT MODAL -->
<div id="depositBox">
  <div id="depositContent">
    <h3>Tambah Saldo</h3>
    <input type="number" id="amount" placeholder="Jumlah"><br><br>
    <button onclick="deposit()">Tambah</button>
    <button onclick="closeDeposit()">Tutup</button>
  </div>
</div>

<script>
let balance = parseInt(localStorage.getItem("balance") || 100);
let multi = 1;
let running = false;
let crashPoint = 0;
let interval;

const ctx = document.getElementById("graph").getContext("2d");
const rocket = document.getElementById("rocket");

updateBalance();

function updateBalance() {
  document.getElementById("balance").innerText = balance;
  localStorage.setItem("balance", balance);
}

function openDeposit() {
  document.getElementById("depositBox").style.display = "flex";
}

function closeDeposit() {
  document.getElementById("depositBox").style.display = "none";
}

function deposit() {
  let amt = parseInt(document.getElementById("amount").value);
  if (!amt) return;

  balance += amt;
  updateBalance();
  closeDeposit();
}

/* GAME */
function resetGraph() {
  ctx.clearRect(0, 0, 350, 300);
  ctx.beginPath();
  ctx.moveTo(0, 300);
}

function startGame() {
  if (running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if (balance < bet) return alert("Saldo kurang");

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;
  crashPoint = Math.random() * 5 + 1;

  resetGraph();
  document.getElementById("result").innerText = "";

  let x = 0;

  interval = setInterval(() => {
    if (!running) return;

    multi *= 1.02;

    let multiEl = document.getElementById("multi");
    multiEl.innerText = multi.toFixed(2) + "x";

    let color = multi < 2 ? "#22c55e" :
                multi < 3 ? "#facc15" :
                "#ef4444";

    multiEl.style.color = color;

    ctx.strokeStyle = color;
    ctx.lineTo(x, 300 - multi * 40);
    ctx.stroke();
    x += 2;

    rocket.style.bottom = (multi * 40) + "px";

    let auto = parseFloat(document.getElementById("auto").value);
    if (auto && multi >= auto) cashOut();

    if (multi >= crashPoint) {
      crash();
      clearInterval(interval);
    }

  }, 50);
}

function crash() {
  document.getElementById("multi").innerText = "💥 CRASH!";
  document.getElementById("result").innerText = "Kalah!";
  running = false;
  rocket.innerText = "💥";
}

function cashOut() {
  if (!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win;

  running = false;
  clearInterval(interval);
}
</script>

</body>
</html>
