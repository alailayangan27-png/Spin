<!DOCTYPE html>
<html>
<head>
  <title>Trading Battle</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 100px;
    }

    button {
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }

    .player {
      margin: 10px;
    }
  </style>
</head>
<body>

<h2>📊 Trading Battle (4 Player)</h2>

<h1 id="timer">30</h1>

<div class="player">P1: <input id="p1"></div>
<div class="player">P2: <input id="p2"></div>
<div class="player">P3: <input id="p3"></div>
<div class="player">P4: <input id="p4"></div>

<button onclick="startGame()">START</button>

<h3 id="result"></h3>

<script>
let time = 30;
let interval;

function startGame() {
  time = 30;
  document.getElementById("result").innerText = "";

  interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if (time <= 0) {
      clearInterval(interval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  let realPrice = Math.floor(Math.random() * 10000 + 20000);

  let guesses = [
    {name:"P1", val:parseInt(p1.value)},
    {name:"P2", val:parseInt(p2.value)},
    {name:"P3", val:parseInt(p3.value)},
    {name:"P4", val:parseInt(p4.value)}
  ];

  guesses.forEach(p=>{
    p.diff = Math.abs(p.val - realPrice);
  });

  guesses.sort((a,b)=>a.diff-b.diff);

  let winner = guesses[0];

  document.getElementById("result").innerText =
    "Harga: " + realPrice + 
    " | Winner: " + winner.name;
}
</script>

</body>
</html>
