<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Battle Stable</title>

<style>
body {
  margin:0;
  background:#0b0f19;
  color:white;
  font-family:Arial;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

#price {
  font-size:24px;
}

canvas {
  width:100%;
  height:200px;
  background:black;
}

input, button {
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
}

button {
  background:green;
  color:white;
  border:none;
}

#timer {
  text-align:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">
  <div>BTC Battle</div>
  <div id="price">$0</div>
</div>

<canvas id="chart"></canvas>

<div id="timer">30</div>

<input id="guess" placeholder="Prediksi harga BTC">
<button id="startBtn">START</button>

<h3 id="result"></h3>

<script>
// ELEMENT
const priceEl = document.getElementById("price");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const guessEl = document.getElementById("guess");
const startBtn = document.getElementById("startBtn");

// CHART
const ctx = document.getElementById("chart").getContext("2d");
let x = 0;

// PRICE (API STABIL)
let price = 0;

async function getPrice(){
  try {
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
    let data = await res.json();
    price = data.bitcoin.usd;

    priceEl.innerText = "$" + price;

    drawChart(price);

  } catch(e){
    console.log("API error");
  }
}

setInterval(getPrice, 2000);

// CHART DRAW
function drawChart(p){
  ctx.lineTo(x, 200 - (p % 1000)/5);
  ctx.strokeStyle="lime";
  ctx.stroke();
  x += 2;

  if(x > 400){
    ctx.clearRect(0,0,400,200);
    ctx.beginPath();
    ctx.moveTo(0,100);
    x = 0;
  }
}

// GAME
let running = false;

startBtn.onclick = () => {

  if(running) return;

  if(!guessEl.value){
    alert("Isi prediksi dulu");
    return;
  }

  running = true;
  let time = 30;

  resultEl.innerText = "";

  let fake = [
    Math.random()*price,
    Math.random()*price,
    Math.random()*price
  ];

  let interval = setInterval(() => {
    time--;
    timerEl.innerText = time;

    if(time <= 0){
      clearInterval(interval);
      running = false;
      endGame(fake);
    }

  },1000);
};

function endGame(fake){

  let players = [
    {name:"You", val:parseFloat(guessEl.value)},
    {name:"P2", val:fake[0]},
    {name:"P3", val:fake[1]},
    {name:"P4", val:fake[2]}
  ];

  players.forEach(p=>{
    p.diff = Math.abs(p.val - price);
  });

  players.sort((a,b)=>a.diff-b.diff);

  resultEl.innerText =
    "Final $" + price +
    " | Winner: " + players[0].name;
}
</script>

</body>
</html>
