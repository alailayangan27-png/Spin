<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Mini Game</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { margin: 10px; }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .spin { background: #22c55e; }
    .start { background: #3b82f6; }
    .cash { background: #f59e0b; }

    #wheel {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin: 20px auto;
      border: 5px solid white;

      background: conic-gradient(
        red 0deg 72deg,
        blue 72deg 144deg,
        green 144deg 216deg,
        orange 216deg 288deg,
        purple 288deg 360deg
      );

      transition: transform 3s ease-out;
    }

    canvas {
      background: #020617;
      border: 2px solid #334155;
    }
  </style>
</head>
<body>

<h1>🎮 Ultimate Game</h1>

<h2>Balance: <span id="balance">100</span></h2>

<!-- SPIN -->
<h3>🎰 Spin</h3>
<div id="wheel"></div>
<button class="spin" onclick="spin()">SPIN</button>
<p id="spinResult"></p>

<hr>

<!-- CRASH -->
<h3>💥 Crash</h3>
<h1 id="multi">1.00x</h1>
<canvas id="graph" width="300" height="200"></canvas><br>

<button class="start" onclick="startCrash()">START</button>
<button class="cash" onclick="cashOut()">CASH OUT</button>

<p id="crashResult"></p>

<script>
let balance = 100;

// ===== SPIN =====
const rewards = [10, 0, 50, 20, 5];

function spin() {
  if (balance < 5) return;

  balance -= 5;
  updateBalance();

  let index = Math.floor(Math.random() * rewards.length);
  let degree = 360 * 5 + index * (360 / rewards.length);

  document.getElementById("wheel").style.transform =
    `rotate(${degree}deg)`;

  setTimeout(() => {
    let reward = rewards[index];
    balance += reward;

    document.getElementById("spinResult").innerText =
      "Dapat: " + reward;

    updateBalance();
  }, 3000);
}

// ===== CRASH =====
let multi = 1;
let running = false;
let crashPoint = 0;
let bet = 10;

let ctx = document.getElementById("graph").getContext("2d");
let x = 0;

function resetGraph() {
  ctx.clearRect(0, 0, 300, 200);
  ctx.beginPath();
  ctx.moveTo(0, 200);
  x = 0;
}

function startCrash() {
  if (running || balance < bet) return;

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;
  crashPoint = (Math.random() * 4 + 1).toFixed(2);

  resetGraph();

  let interval = setInterval(() => {
    if (!running) return;

    multi += 0.02;
    document.getElementById("multi").innerText =
      multi.toFixed(2) + "x";

    ctx.lineTo(x, 200 - multi * 20);
    ctx.strokeStyle = "#22c55e";
    ctx.stroke();
    x += 2;

    if (multi >= crashPoint) {
      document.getElementById("multi").innerText = "💥 CRASH!";
      document.getElementById("crashResult").innerText = "Kalah!";
      running = false;
      clearInterval(interval);
    }

  }, 50);
}

function cashOut() {
  if (!running) return;

  let win = Math.floor(bet * multi);
  balance += win;

  document.getElementById("crashResult").innerText =
    "Menang: " + win;

  running = false;
  updateBalance();
}

function updateBalance() {
  document.getElementById("balance").innerText = balance;
}
</script>

</body>
</html>
