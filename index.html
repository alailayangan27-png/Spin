<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Battle Room</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

/* ROOM */
.room {
  padding:10px;
}

.slot {
  background:#111;
  padding:10px;
  margin:5px;
  border-radius:6px;
}

/* PRICE */
#price {
  text-align:center;
  font-size:35px;
}

/* PLAY AREA */
.players {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.player {
  background:#111;
  padding:10px;
  border-radius:8px;
}

/* INPUT */
input {
  width:100%;
  padding:8px;
  border:none;
  border-radius:5px;
}

/* CONTROL */
.controls {
  text-align:center;
  padding:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

.start { background:#22c55e; }

/* TIMER */
#timer {
  font-size:25px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div>📊 Trading Room</div>
  <div id="timer">30</div>
</div>

<div id="price">$0</div>

<!-- ROOM -->
<div class="room">
  <div class="slot" id="slot1">P1: Waiting...</div>
  <div class="slot" id="slot2">P2: Waiting...</div>
  <div class="slot" id="slot3">P3: Waiting...</div>
  <div class="slot" id="slot4">P4: Waiting...</div>
</div>

<!-- INPUT -->
<div class="players">
  <div class="player">You <input id="guess"></div>
</div>

<div class="controls">
  <button class="start" onclick="startGame()">START MATCH</button>
</div>

<h3 id="result" style="text-align:center;"></h3>

<script>
// ===== FAKE ROOM JOIN =====
const names = ["Rizky","Andi","Budi","Doni","Fajar"];

function fillRoom() {
  for(let i=1;i<=4;i++){
    let name = names[Math.floor(Math.random()*names.length)];
    document.getElementById("slot"+i).innerText =
      "P"+i+": "+name;
  }
}
fillRoom();

// ===== REAL PRICE =====
let price = 0;
let ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (e)=>{
  let data = JSON.parse(e.data);
  price = parseFloat(data.p);

  document.getElementById("price").innerText =
    "$"+price.toFixed(2);
};

// ===== GAME =====
let running = false;
let time = 30;

function startGame(){
  if(running) return;

  running = true;
  time = 30;
  document.getElementById("result").innerText="";

  let fakeGuesses = [
    Math.random()*price,
    Math.random()*price,
    Math.random()*price
  ];

  let timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
      running=false;
      clearInterval(timer);
      endGame(fakeGuesses);
    }
  },1000);
}

function endGame(fake){
  let finalPrice = price;

  let players = [
    {name:"You", val:parseFloat(guess.value)},
    {name:"P2", val:fake[0]},
    {name:"P3", val:fake[1]},
    {name:"P4", val:fake[2]}
  ];

  players.forEach(p=>{
    p.diff = Math.abs(p.val - finalPrice);
  });

  players.sort((a,b)=>a.diff-b.diff);

  let winner = players[0];

  document.getElementById("result").innerText =
    "Final: $" + finalPrice.toFixed(2) +
    " | Winner: " + winner.name;
}
</script>

</body>
</html>
