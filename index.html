<!DOCTYPE html>
<html>
<head>
  <title>Crash Game X</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin: 10px;
    }

    canvas {
      background: #000;
      border: 2px solid #334155;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    .start { background: #22c55e; }
    .cash { background: #f59e0b; }

    #players, #history {
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>💥 Crash Game X</h2>

<h1 id="multi">1.00x</h1>

<canvas id="graph" width="320" height="200"></canvas><br>

<input type="number" id="bet" value="10">
<input type="number" id="auto" placeholder="Auto cashout">

<br>

<button class="start" onclick="startGame()">START</button>
<button class="cash" onclick="cashOut()">CASH OUT</button>

<h3 id="result"></h3>
<h3 id="balance"></h3>

<div id="players"></div>
<div id="history"></div>

<script>
let balance = localStorage.getItem("balance") || 100;
balance = parseInt(balance);

let multi = 1;
let running = false;
let crashPoint = 0;
let interval;
let history = [];

const ctx = document.getElementById("graph").getContext("2d");

function updateBalance() {
  document.getElementById("balance").innerText =
    "Balance: " + balance;
  localStorage.setItem("balance", balance);
}
updateBalance();

function resetGraph() {
  ctx.clearRect(0, 0, 320, 200);
  ctx.beginPath();
  ctx.moveTo(0, 200);
}

function playTick() {
  let audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
  audio.volume = 0.1;
  audio.play();
}

function startGame() {
  if (running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if (balance < bet) return alert("Saldo kurang");

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;

  crashPoint = Math.random() * 5 + 1;

  resetGraph();
  document.getElementById("result").innerText = "";

  let x = 0;

  interval = setInterval(() => {
    if (!running) return;

    multi *= 1.02;

    let color = multi < 2 ? "#22c55e" :
                multi < 3 ? "#facc15" :
                "#ef4444";

    document.getElementById("multi").innerText =
      multi.toFixed(2) + "x";
    document.getElementById("multi").style.color = color;

    ctx.strokeStyle = color;
    ctx.lineTo(x, 200 - multi * 15);
    ctx.stroke();
    x += 2;

    playTick();

    // auto cashout
    let auto = parseFloat(document.getElementById("auto").value);
    if (auto && multi >= auto) cashOut();

    // crash
    if (multi >= crashPoint) {
      crash();
      clearInterval(interval);
    }

  }, 60);
}

function crash() {
  document.getElementById("multi").innerText = "💥 CRASH!";
  document.getElementById("result").innerText = "Kalah!";
  running = false;

  history.unshift(crashPoint.toFixed(2) + "x");
  updateHistory();
}

function cashOut() {
  if (!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win + " (" + multi.toFixed(2) + "x)";

  running = false;
  clearInterval(interval);
}

function updateHistory() {
  document.getElementById("history").innerText =
    "History: " + history.slice(0, 10).join(" | ");
}

// fake players
const names = ["Rizky","Andi","Budi","Doni","Fajar","Rama"];

setInterval(() => {
  let name = names[Math.floor(Math.random()*names.length)];
  let val = (Math.random()*3+1).toFixed(2);

  document.getElementById("players").innerText =
    name + " cash out di " + val + "x";
}, 2000);
</script>

</body>
</html>
