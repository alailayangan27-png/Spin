<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Crash Pro UI</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
}

.balance {
  font-weight: bold;
}

/* GAME AREA */
.game {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#multi {
  font-size: 64px;
  font-weight: bold;
  margin: 10px;
  text-shadow: 0 0 20px rgba(0,255,255,0.5);
}

.canvas-wrap {
  position: relative;
}

canvas {
  border-radius: 10px;
  background: #000;
}

#rocket {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  font-size: 35px;
}

/* CONTROL PANEL */
.controls {
  display: grid;
  gap: 10px;
  padding: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
}

.row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.start {
  background: linear-gradient(135deg, #22c55e, #16a34a);
}

.cash {
  background: linear-gradient(135deg, #f59e0b, #d97706);
}

button:hover {
  transform: scale(1.05);
}

/* RESULT */
.result {
  text-align: center;
  font-size: 18px;
}

/* MODAL */
.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background:#111;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="topbar">
    <div>🚀 Space Crash</div>
    <div class="balance">💰 <span id="balance"></span></div>
    <button onclick="openDeposit()">+ Top Up</button>
  </div>

  <!-- GAME -->
  <div class="game">
    <div id="multi">1.00x</div>

    <div class="canvas-wrap">
      <canvas id="graph" width="320" height="200"></canvas>
      <div id="rocket">🚀</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <div class="row">
      <input type="number" id="bet" value="10">
      <input type="number" id="auto" placeholder="Auto cashout">
    </div>

    <div class="row">
      <button class="start" onclick="startGame()">LAUNCH</button>
      <button class="cash" onclick="cashOut()">CASH OUT</button>
    </div>

    <div class="result" id="result"></div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="depositBox">
  <div class="modal-content">
    <h3>Top Up Saldo</h3>
    <input type="number" id="amount" placeholder="Jumlah"><br><br>
    <button onclick="deposit()">Tambah</button>
    <button onclick="closeDeposit()">Tutup</button>
  </div>
</div>

<script>
let balance = parseInt(localStorage.getItem("balance") || 100);

let multi = 1;
let running = false;
let crashPoint = 0;
let interval;

const ctx = document.getElementById("graph").getContext("2d");
const rocket = document.getElementById("rocket");

updateBalance();

function updateBalance(){
  document.getElementById("balance").innerText = balance;
  localStorage.setItem("balance", balance);
}

function openDeposit(){
  document.getElementById("depositBox").style.display = "flex";
}

function closeDeposit(){
  document.getElementById("depositBox").style.display = "none";
}

function deposit(){
  let amt = parseInt(document.getElementById("amount").value);
  if(!amt) return;
  balance += amt;
  updateBalance();
  closeDeposit();
}

function resetGraph(){
  ctx.clearRect(0,0,320,200);
  ctx.beginPath();
  ctx.moveTo(0,200);
}

function startGame(){
  if(running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if(balance < bet) return alert("Saldo kurang");

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;
  crashPoint = Math.random()*5 + 1;

  resetGraph();
  document.getElementById("result").innerText = "";

  let x = 0;

  interval = setInterval(()=>{
    if(!running) return;

    multi *= 1.02;

    let el = document.getElementById("multi");
    el.innerText = multi.toFixed(2) + "x";

    let color = multi < 2 ? "#22c55e" :
                multi < 3 ? "#facc15" :
                "#ef4444";

    el.style.color = color;

    ctx.strokeStyle = color;
    ctx.lineTo(x, 200 - multi * 15);
    ctx.stroke();
    x += 2;

    rocket.style.bottom = (multi * 15) + "px";

    let auto = parseFloat(document.getElementById("auto").value);
    if(auto && multi >= auto) cashOut();

    if(multi >= crashPoint){
      crash();
      clearInterval(interval);
    }

  },50);
}

function crash(){
  document.getElementById("multi").innerText = "💥 CRASH!";
  document.getElementById("result").innerText = "Kalah!";
  running = false;
  rocket.innerText = "💥";
}

function cashOut(){
  if(!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win;

  running = false;
  clearInterval(interval);
}
</script>

</body>
</html>
