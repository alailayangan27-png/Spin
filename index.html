<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Crash Premium</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* BACKGROUND STAR */
canvas.bg {
  position: fixed;
  top:0;
  left:0;
  z-index: -1;
}

/* TOPBAR */
.topbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

/* MULTIPLIER */
#multi {
  text-align:center;
  font-size:70px;
  margin-top:10px;
  text-shadow:0 0 30px cyan;
}

/* GAME */
.game {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.graph-wrap {
  position:relative;
}

#rocket {
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  font-size:35px;
  transition:0.05s;
}

/* CONTROLS */
.controls {
  padding:15px;
  display:grid;
  gap:10px;
}

.row {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#111;
  color:white;
}

button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#22c55e; }
.cash { background:#f59e0b; }

.result {
  text-align:center;
}

/* CRASH EFFECT */
.flash {
  animation: flash 0.3s;
}
@keyframes flash {
  0% { background:red; }
  100% { background:black; }
}
</style>
</head>

<body>

<canvas class="bg" id="stars"></canvas>

<div class="topbar">
  <div>🚀 Space Crash</div>
  <div>💰 <span id="balance"></span></div>
</div>

<div id="multi">1.00x</div>

<div class="game">
  <div class="graph-wrap">
    <canvas id="graph" width="320" height="200"></canvas>
    <div id="rocket">🚀</div>
  </div>
</div>

<div class="controls">
  <div class="row">
    <input type="number" id="bet" value="10">
    <input type="number" id="auto" placeholder="Auto">
  </div>

  <div class="row">
    <button class="start" onclick="startGame()">LAUNCH</button>
    <button class="cash" onclick="cashOut()">CASH OUT</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
// ===== STAR BACKGROUND =====
const starCanvas = document.getElementById("stars");
const sctx = starCanvas.getContext("2d");

starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;

let stars = Array(100).fill().map(() => ({
  x: Math.random()*starCanvas.width,
  y: Math.random()*starCanvas.height,
  size: Math.random()*2
}));

function drawStars(){
  sctx.clearRect(0,0,starCanvas.width,starCanvas.height);
  sctx.fillStyle = "white";

  stars.forEach(s=>{
    s.y += 0.5;
    if(s.y > starCanvas.height) s.y = 0;

    sctx.fillRect(s.x,s.y,s.size,s.size);
  });

  requestAnimationFrame(drawStars);
}
drawStars();

// ===== GAME =====
let balance = parseInt(localStorage.getItem("balance") || 100);

let multi = 1;
let running = false;
let crashPoint = 0;
let interval;

const ctx = document.getElementById("graph").getContext("2d");
const rocket = document.getElementById("rocket");

updateBalance();

function updateBalance(){
  document.getElementById("balance").innerText = balance;
  localStorage.setItem("balance", balance);
}

function resetGraph(){
  ctx.clearRect(0,0,320,200);
  ctx.beginPath();
  ctx.moveTo(0,200);
}

function startGame(){
  if(running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if(balance < bet) return;

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;
  crashPoint = Math.random()*5 + 1;

  resetGraph();
  document.getElementById("result").innerText = "";

  let x = 0;

  interval = setInterval(()=>{
    if(!running) return;

    multi *= 1.02;

    let el = document.getElementById("multi");
    el.innerText = multi.toFixed(2) + "x";

    let color = multi < 2 ? "#22c55e" :
                multi < 3 ? "#facc15" :
                "#ef4444";

    el.style.color = color;

    ctx.strokeStyle = color;
    ctx.lineTo(x, 200 - multi * 15);
    ctx.stroke();
    x += 2;

    rocket.style.bottom = (multi * 15) + "px";

    let auto = parseFloat(document.getElementById("auto").value);
    if(auto && multi >= auto) cashOut();

    if(multi >= crashPoint){
      crash();
      clearInterval(interval);
    }

  },50);
}

function crash(){
  document.body.classList.add("flash");

  document.getElementById("multi").innerText = "💥 CRASH!";
  document.getElementById("result").innerText = "Kalah!";
  running = false;

  rocket.innerText = "💥";

  setTimeout(()=>{
    document.body.classList.remove("flash");
  },300);
}

function cashOut(){
  if(!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win;

  running = false;
  clearInterval(interval);
}
</script>

</body>
</html>
