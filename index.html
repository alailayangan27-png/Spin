<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Battle Live</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

#price {
  text-align:center;
  font-size:40px;
  margin:10px;
}

canvas {
  width:100%;
  height:200px;
  background:black;
}

.players {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.player {
  background:#111;
  padding:10px;
  border-radius:8px;
}

input {
  width:100%;
  padding:8px;
  border:none;
  border-radius:5px;
}

.controls {
  text-align:center;
  padding:10px;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:5px;
}

.start { background:#22c55e; }

#timer {
  font-size:30px;
}

.result {
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div>📊 Trading Battle LIVE</div>
  <div id="timer">30</div>
</div>

<div id="price">$0</div>

<canvas id="chart"></canvas>

<div class="players">
  <div class="player">P1 <input id="p1"></div>
  <div class="player">P2 <input id="p2"></div>
  <div class="player">P3 <input id="p3"></div>
  <div class="player">P4 <input id="p4"></div>
</div>

<div class="controls">
  <button class="start" onclick="startGame()">START</button>
</div>

<div class="result" id="result"></div>

<script>
// ===== REAL PRICE (BINANCE WS) =====
let price = 0;

let ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (event) => {
  let data = JSON.parse(event.data);
  price = parseFloat(data.p);

  document.getElementById("price").innerText =
    "$" + price.toFixed(2);

  updateChart(price);
};

// ===== CHART =====
const ctx = document.getElementById("chart").getContext("2d");
let x = 0;

function updateChart(p) {
  ctx.lineTo(x, 200 - (p % 1000)/5);
  ctx.strokeStyle = "#22c55e";
  ctx.stroke();
  x += 2;

  if (x > 400) {
    ctx.clearRect(0,0,400,200);
    ctx.beginPath();
    ctx.moveTo(0,100);
    x = 0;
  }
}

// ===== GAME =====
let running = false;
let time = 30;

function startGame() {
  if (running) return;

  running = true;
  time = 30;
  document.getElementById("result").innerText = "";

  let timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if (time <= 0) {
      running = false;
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  let finalPrice = price;

  let players = [
    {name:"P1", val:parseFloat(p1.value)},
    {name:"P2", val:parseFloat(p2.value)},
    {name:"P3", val:parseFloat(p3.value)},
    {name:"P4", val:parseFloat(p4.value)}
  ];

  players.forEach(p=>{
    p.diff = Math.abs(p.val - finalPrice);
  });

  players.sort((a,b)=>a.diff-b.diff);

  let winner = players[0];

  document.getElementById("result").innerText =
    "Final: $" + finalPrice.toFixed(2) +
    " | Winner: " + winner.name;
}
</script>

</body>
</html>
