<!DOCTYPE html>
<html>
<head>
  <title>Crash Game PRO+</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin: 10px;
    }

    canvas {
      background: #000;
      border: 2px solid #334155;
      margin-top: 20px;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    .start { background: #22c55e; }
    .cash { background: #f59e0b; }

  </style>
</head>
<body>

<h2>💥 Crash Game PRO+</h2>

<h1 id="multi">1.00x</h1>

<canvas id="graph" width="320" height="200"></canvas><br>

<input type="number" id="bet" value="10" placeholder="Bet">
<input type="number" id="auto" placeholder="Auto cashout (opsional)">

<br>

<button class="start" onclick="startGame()">START</button>
<button class="cash" onclick="cashOut()">CASH OUT</button>

<h3 id="result"></h3>
<h3 id="balance"></h3>

<script>
let balance = localStorage.getItem("balance") || 100;
balance = parseInt(balance);

let multi = 1;
let running = false;
let crashPoint = 0;
let interval;

const ctx = document.getElementById("graph").getContext("2d");

function updateBalance() {
  document.getElementById("balance").innerText =
    "Balance: " + balance;
  localStorage.setItem("balance", balance);
}

updateBalance();

function resetGraph() {
  ctx.clearRect(0, 0, 320, 200);
  ctx.beginPath();
  ctx.moveTo(0, 200);
}

function startGame() {
  if (running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if (balance < bet) return alert("Saldo kurang");

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;

  crashPoint = Math.random() * 5 + 1; // 1x - 6x

  resetGraph();

  let x = 0;

  interval = setInterval(() => {
    if (!running) return;

    // curve growth (lebih realistis)
    multi *= 1.01;

    document.getElementById("multi").innerText =
      multi.toFixed(2) + "x";

    // grafik smooth
    ctx.lineTo(x, 200 - multi * 15);
    ctx.strokeStyle = "#22c55e";
    ctx.stroke();

    x += 2;

    // auto cashout
    let auto = parseFloat(document.getElementById("auto").value);
    if (auto && multi >= auto) {
      cashOut();
    }

    // crash
    if (multi >= crashPoint) {
      document.getElementById("multi").innerText = "💥 CRASH!";
      document.getElementById("result").innerText = "Kalah!";
      running = false;
      clearInterval(interval);
    }

  }, 50);
}

function cashOut() {
  if (!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win + " (" + multi.toFixed(2) + "x)";

  running = false;
  clearInterval(interval);
}
</script>

</body>
</html>
