<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Battle Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

/* PRICE */
#price {
  text-align:center;
  font-size:40px;
  margin:10px;
}

/* GRAPH */
canvas {
  background:black;
  width:100%;
  height:200px;
}

/* PLAYERS */
.players {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.player {
  background:#111;
  padding:10px;
  border-radius:8px;
}

input {
  width:100%;
  padding:8px;
  border:none;
  border-radius:5px;
}

/* CONTROL */
.controls {
  text-align:center;
  padding:10px;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.start { background:#22c55e; }

/* TIMER */
#timer {
  font-size:30px;
  text-align:center;
}

.result {
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <div>📊 Trading Battle</div>
  <div id="timer">30</div>
</div>

<div id="price">$30000</div>

<canvas id="chart"></canvas>

<div class="players">
  <div class="player">P1 <input id="p1"></div>
  <div class="player">P2 <input id="p2"></div>
  <div class="player">P3 <input id="p3"></div>
  <div class="player">P4 <input id="p4"></div>
</div>

<div class="controls">
  <button class="start" onclick="startGame()">START</button>
</div>

<div class="result" id="result"></div>

<script>
let price = 30000;
let running = false;
let time = 30;

const ctx = document.getElementById("chart").getContext("2d");

function drawChart(x, y) {
  ctx.lineTo(x, 200 - y);
  ctx.strokeStyle = "#22c55e";
  ctx.stroke();
}

function startGame() {
  if (running) return;

  running = true;
  time = 30;
  document.getElementById("result").innerText = "";

  ctx.clearRect(0,0,500,200);
  ctx.beginPath();
  ctx.moveTo(0,100);

  let x = 0;

  let priceInterval = setInterval(() => {
    if (!running) return;

    // simulasi harga
    price += Math.floor(Math.random()*200 - 100);

    document.getElementById("price").innerText =
      "$" + price;

    drawChart(x, price/200);
    x += 5;

  }, 500);

  let timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if (time <= 0) {
      running = false;
      clearInterval(timerInterval);
      clearInterval(priceInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  let finalPrice = price;

  let players = [
    {name:"P1", val:parseInt(p1.value)},
    {name:"P2", val:parseInt(p2.value)},
    {name:"P3", val:parseInt(p3.value)},
    {name:"P4", val:parseInt(p4.value)}
  ];

  players.forEach(p=>{
    p.diff = Math.abs(p.val - finalPrice);
  });

  players.sort((a,b)=>a.diff-b.diff);

  let winner = players[0];

  document.getElementById("result").innerText =
    "Final Price: $" + finalPrice +
    " | Winner: " + winner.name;
}
</script>

</body>
</html>
