<!DOCTYPE html>
<html>
<head>
  <title>Crash Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    h1 {
      font-size: 50px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>💥 Crash Game</h2>
<h1 id="multiplier">1.00x</h1>

<button onclick="startGame()">START</button>
<button onclick="cashOut()">CASH OUT</button>

<h3 id="result"></h3>

<script>
let multi = 1;
let running = false;
let crashed = false;
let crashPoint = 0;

function startGame() {
  if (running) return;

  multi = 1;
  crashed = false;
  running = true;

  crashPoint = (Math.random() * 4 + 1).toFixed(2); // 1x - 5x

  const interval = setInterval(() => {
    if (!running) return;

    multi += 0.01;
    document.getElementById("multiplier").innerText =
      multi.toFixed(2) + "x";

    if (multi >= crashPoint) {
      document.getElementById("multiplier").innerText = "💥 CRASH!";
      document.getElementById("result").innerText = "Kamu kalah!";
      running = false;
      crashed = true;
      clearInterval(interval);
    }

  }, 50);
}

function cashOut() {
  if (!running || crashed) return;

  document.getElementById("result").innerText =
    "Cash out di " + multi.toFixed(2) + "x 🎉";

  running = false;
}
</script>

</body>
</html>
