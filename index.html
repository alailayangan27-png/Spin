<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Trading Battle</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin:0;
  background:#0b0f19;
  color:white;
  font-family:'Segoe UI', sans-serif;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

#price {
  font-size:26px;
  font-weight:bold;
}

#chart {
  height:300px;
}

.room {
  padding:10px;
}

.slot {
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-bottom:5px;
  background:#111827;
  border-radius:8px;
}

.input-box {
  padding:10px;
}

input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  background:gray;
}

#timer {
  text-align:center;
  font-size:22px;
  margin-top:5px;
}

.countdown {
  text-align:center;
  font-size:40px;
  color:cyan;
}
</style>
</head>

<body>

<div class="header">
  <div>₿ BTC Battle</div>
  <div id="price">$0</div>
</div>

<div id="chart"></div>

<div id="timer">30s</div>
<div class="countdown" id="countdown"></div>

<div class="room">
  <div class="slot"><span>P1</span><span id="s1"></span></div>
  <div class="slot"><span>P2</span><span id="s2"></span></div>
  <div class="slot"><span>P3</span><span id="s3"></span></div>
  <div class="slot"><span>P4</span><span id="s4"></span></div>
</div>

<div class="input-box">
  <input id="guess" placeholder="Prediksi harga BTC">
  <button id="startBtn">START MATCH</button>
</div>

<h3 id="result" style="text-align:center;"></h3>

<script>
// ===== ELEMENT =====
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const guessEl = document.getElementById("guess");
const startBtn = document.getElementById("startBtn");
const countdownEl = document.getElementById("countdown");

// ===== ROOM =====
const names=["Rizky","Andi","Budi","Doni","Fajar"];
for(let i=1;i<=4;i++){
  document.getElementById("s"+i).innerText =
    names[Math.floor(Math.random()*names.length)];
}

// ===== CHART =====
const chart = LightweightCharts.createChart(
  document.getElementById('chart'),
  { layout: { background:{color:'#0b0f19'}, textColor:'#DDD' } }
);

const candleSeries = chart.addCandlestickSeries();

// ===== PRICE =====
let price = 0;

let ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (e)=>{
  let data = JSON.parse(e.data);
  price = parseFloat(data.p);

  document.getElementById("price").innerText =
    "$"+price.toLocaleString();

  updateCandle(price);
};

// ===== CANDLE =====
let candle = null;

function updateCandle(p){
  let time = Math.floor(Date.now()/1000);

  if(!candle || candle.time !== time){
    candle = {
      time: time,
      open: p,
      high: p,
      low: p,
      close: p
    };
  } else {
    candle.high = Math.max(candle.high,p);
    candle.low = Math.min(candle.low,p);
    candle.close = p;
  }

  candleSeries.update(candle);
}

// ===== GAME =====
let running = false;
let time = 30;

startBtn.onclick = async () => {
  if (running) return;

  if (!guessEl.value) {
    alert("Masukkan prediksi dulu!");
    return;
  }

  startBtn.disabled = true;
  resultEl.innerText = "";

  // countdown 3..2..1
  for (let i = 3; i > 0; i--) {
    countdownEl.innerText = i;
    await new Promise(r => setTimeout(r, 800));
  }
  countdownEl.innerText = "";

  running = true;
  time = 30;

  let fake = [
    Math.random()*price,
    Math.random()*price,
    Math.random()*price
  ];

  let t = setInterval(() => {
    time--;
    timerEl.innerText = time + "s";

    if (time <= 0) {
      running = false;
      clearInterval(t);
      endGame(fake);
      startBtn.disabled = false;
    }
  }, 1000);
};

function endGame(fake){
  let players = [
    {name:"You", val:parseFloat(guessEl.value)},
    {name:"P2", val:fake[0]},
    {name:"P3", val:fake[1]},
    {name:"P4", val:fake[2]}
  ];

  players.forEach(p=>{
    p.diff = Math.abs(p.val - price);
  });

  players.sort((a,b)=>a.diff-b.diff);

  resultEl.innerText =
    "Final $" + price.toLocaleString() +
    " | Winner: " + players[0].name;
}
</script>

</body>
</html>
