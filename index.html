<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Spin Wheel</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

#wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  margin: 30px auto;
  border: 8px solid white;
  position: relative;

  background: conic-gradient(
    #ff4757 0deg 72deg,
    #1e90ff 72deg 144deg,
    #2ed573 144deg 216deg,
    #ffa502 216deg 288deg,
    #a55eea 288deg 360deg
  );

  transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}

#pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 30px solid white;
  margin: auto;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  background: #00cec9;
  color: black;
  border-radius: 5px;
}

button:hover {
  background: #00b894;
}

</style>
</head>

<body>

<h2>🎰 Spin Wheel PRO</h2>

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<h3 id="result"></h3>
<h4 id="score">Score: 0</h4>

<script>
const rewards = ["💰 10", "❌ Zonk", "🔥 50", "🎁 20", "💀 0"];
let score = localStorage.getItem("score") || 0;

document.getElementById("score").innerText = "Score: " + score;

function spin() {
  const wheel = document.getElementById("wheel");
  const resultText = document.getElementById("result");

  const randomIndex = Math.floor(Math.random() * rewards.length);
  const slice = 360 / rewards.length;

  const degree = 360 * 5 + (360 - (randomIndex * slice) - slice/2);

  wheel.style.transform = `rotate(${degree}deg)`;

  setTimeout(() => {
    let result = rewards[randomIndex];
    resultText.innerText = "Hasil: " + result;

    let value = parseInt(result.replace(/\D/g,'')) || 0;
    score = parseInt(score) + value;

    localStorage.setItem("score", score);
    document.getElementById("score").innerText = "Score: " + score;

  }, 4000);
}
</script>

</body>
</html>
