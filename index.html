<!DOCTYPE html>
<html>
<head>
  <title>Space Crash</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #020617, #000);
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 60px;
      margin-top: 20px;
      text-shadow: 0 0 20px #00f;
    }

    #game {
      position: relative;
      height: 300px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    #rocket {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      font-size: 40px;
      transition: 0.1s;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .start { background: #22c55e; }
    .cash { background: #f59e0b; }

    #balance {
      margin-top: 10px;
      font-size: 18px;
    }

    .glow {
      color: #00f;
      text-shadow: 0 0 10px #00f, 0 0 20px #00f;
    }
  </style>
</head>
<body>

<h2>🚀 Space Crash</h2>
<h1 id="multi" class="glow">1.00x</h1>

<div id="game">
  <canvas id="graph" width="320" height="300"></canvas>
  <div id="rocket">🚀</div>
</div>

<br>

<input type="number" id="bet" value="10">
<input type="number" id="auto" placeholder="Auto">

<br>

<button class="start" onclick="startGame()">LAUNCH</button>
<button class="cash" onclick="cashOut()">CASH OUT</button>

<h3 id="result"></h3>
<h3 id="balance"></h3>

<script>
let balance = parseInt(localStorage.getItem("balance") || 100);

let multi = 1;
let running = false;
let crashPoint = 0;
let interval;

const ctx = document.getElementById("graph").getContext("2d");
const rocket = document.getElementById("rocket");

updateBalance();

function updateBalance() {
  document.getElementById("balance").innerText =
    "Balance: " + balance;
  localStorage.setItem("balance", balance);
}

function resetGraph() {
  ctx.clearRect(0, 0, 320, 300);
  ctx.beginPath();
  ctx.moveTo(0, 300);
}

function startGame() {
  if (running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if (balance < bet) return alert("Saldo kurang");

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;
  crashPoint = Math.random() * 5 + 1;

  resetGraph();
  document.getElementById("result").innerText = "";

  let x = 0;

  interval = setInterval(() => {
    if (!running) return;

    multi *= 1.02;

    let multiEl = document.getElementById("multi");
    multiEl.innerText = multi.toFixed(2) + "x";

    // warna berubah
    let color = multi < 2 ? "#22c55e" :
                multi < 3 ? "#facc15" :
                "#ef4444";

    multiEl.style.color = color;

    // grafik
    ctx.strokeStyle = color;
    ctx.lineTo(x, 300 - multi * 40);
    ctx.stroke();
    x += 2;

    // rocket naik
    rocket.style.bottom = (multi * 40) + "px";

    // auto cashout
    let auto = parseFloat(document.getElementById("auto").value);
    if (auto && multi >= auto) cashOut();

    // crash
    if (multi >= crashPoint) {
      crash();
      clearInterval(interval);
    }

  }, 50);
}

function crash() {
  document.getElementById("multi").innerText = "💥 CRASH!";
  document.getElementById("result").innerText = "Kalah!";
  running = false;

  rocket.innerText = "💥";
}

function cashOut() {
  if (!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win + " (" + multi.toFixed(2) + "x)";

  running = false;
  clearInterval(interval);
}
</script>

</body>
</html>
