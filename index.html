<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Trading Battle Pro</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin:0;
  background:#0b0f19;
  color:white;
  font-family:'Segoe UI', sans-serif;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

#price {
  font-size:26px;
  font-weight:bold;
}

/* CHART */
#chart {
  height:300px;
}

/* ROOM */
.room {
  padding:10px;
}

.slot {
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-bottom:5px;
  background:#111827;
  border-radius:8px;
}

/* INPUT */
.input-box {
  padding:10px;
}

input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:white;
  font-weight:bold;
}

/* TIMER */
#timer {
  text-align:center;
  font-size:22px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>₿ BTC Battle Pro</div>
  <div id="price">$0</div>
</div>

<div id="chart"></div>

<div id="timer">30s</div>

<div class="room">
  <div class="slot"><span>P1</span><span id="s1"></span></div>
  <div class="slot"><span>P2</span><span id="s2"></span></div>
  <div class="slot"><span>P3</span><span id="s3"></span></div>
  <div class="slot"><span>P4</span><span id="s4"></span></div>
</div>

<div class="input-box">
  <input id="guess" placeholder="Prediksi harga BTC">
  <button onclick="startGame()">START MATCH</button>
</div>

<h3 id="result" style="text-align:center;"></h3>

<script>
// ===== ROOM =====
const names=["Rizky","Andi","Budi","Doni","Fajar"];
for(let i=1;i<=4;i++){
  document.getElementById("s"+i).innerText =
    names[Math.floor(Math.random()*names.length)];
}

// ===== CHART SETUP =====
const chart = LightweightCharts.createChart(
  document.getElementById('chart'),
  { layout: { background:{color:'#0b0f19'}, textColor:'#DDD' } }
);

const candleSeries = chart.addCandlestickSeries();

// ===== PRICE =====
let price = 0;

// WebSocket Binance
let ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (e)=>{
  let data = JSON.parse(e.data);
  price = parseFloat(data.p);

  document.getElementById("price").innerText =
    "$"+price.toLocaleString();

  updateCandle(price);
};

// ===== CANDLE LOGIC =====
let candle = null;

function updateCandle(p){
  let time = Math.floor(Date.now()/1000);

  if(!candle || candle.time !== time){
    candle = {
      time: time,
      open: p,
      high: p,
      low: p,
      close: p
    };
  } else {
    candle.high = Math.max(candle.high,p);
    candle.low = Math.min(candle.low,p);
    candle.close = p;
  }

  candleSeries.update(candle);
}

// ===== GAME =====
let running=false;
let time=30;

function startGame(){
  if(running) return;

  running=true;
  time=30;
  result.innerText="";

  let fake=[
    Math.random()*price,
    Math.random()*price,
    Math.random()*price
  ];

  let t=setInterval(()=>{
    time--;
    timer.innerText=time+"s";

    if(time<=0){
      running=false;
      clearInterval(t);
      endGame(fake);
    }
  },1000);
}

function endGame(fake){
  let players=[
    {name:"You",val:parseFloat(guess.value)},
    {name:"P2",val:fake[0]},
    {name:"P3",val:fake[1]},
    {name:"P4",val:fake[2]}
  ];

  players.forEach(p=>{
    p.diff=Math.abs(p.val-price);
  });

  players.sort((a,b)=>a.diff-b.diff);

  result.innerText =
    "Final $" + price.toLocaleString() +
    " | Winner: " + players[0].name;
}
</script>

</body>
</html>
