<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Crash Ultra</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
  overflow:hidden;
}

/* TOP */
.topbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.6);
}

/* MULTI */
#multi {
  text-align:center;
  font-size:60px;
  text-shadow:0 0 20px cyan;
}

/* GAME */
.wrap {
  display:flex;
  justify-content:center;
}

#rocket {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
}

/* CONTROLS */
.controls {
  padding:10px;
}

button {
  padding:10px;
  margin:5px;
}

/* HISTORY */
#history span {
  padding:5px;
  margin:2px;
  border-radius:4px;
}

.low { background:red; }
.mid { background:orange; }
.high { background:green; }

/* FEED */
#feed {
  position:absolute;
  right:10px;
  top:80px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>🚀 Space Crash</div>
  <div>💰 <span id="balance"></span></div>
</div>

<h1 id="multi">1.00x</h1>

<div class="wrap">
  <canvas id="graph" width="320" height="200"></canvas>
  <div id="rocket">🚀</div>
</div>

<div class="controls">
  <input type="number" id="bet" value="10">
  <button onclick="startGame()">LAUNCH</button>
  <button onclick="cashOut()">CASH</button>
</div>

<div id="history"></div>
<div id="feed"></div>

<script>
// SOUND
let tick = new Audio("https://www.soundjay.com/button/beep-07.wav");
let boom = new Audio("https://www.soundjay.com/explosion/explosion-01.mp3");

// GAME
let balance = parseInt(localStorage.getItem("balance")||100);
let multi=1,running=false,crashPoint=0,interval;
let history=[];

const ctx = document.getElementById("graph").getContext("2d");
const rocket = document.getElementById("rocket");

updateBalance();

function updateBalance(){
 document.getElementById("balance").innerText=balance;
 localStorage.setItem("balance",balance);
}

function resetGraph(){
 ctx.clearRect(0,0,320,200);
 ctx.beginPath();
 ctx.moveTo(0,200);
}

function startGame(){
 if(running) return;

 let bet=parseInt(document.getElementById("bet").value);
 if(balance<bet) return;

 balance-=bet;
 updateBalance();

 multi=1;
 running=true;
 crashPoint=Math.random()*5+1;

 resetGraph();

 let x=0;

 interval=setInterval(()=>{
  if(!running) return;

  multi*=1.03;

  document.getElementById("multi").innerText=multi.toFixed(2)+"x";

  ctx.lineTo(x,200-multi*15);
  ctx.strokeStyle="lime";
  ctx.stroke();
  x+=2;

  rocket.style.bottom=(multi*15)+"px";

  tick.currentTime=0;
  tick.play();

  if(multi>=crashPoint){
    crash();
    clearInterval(interval);
  }

 },60);
}

function crash(){
 boom.play();
 document.getElementById("multi").innerText="💥";
 running=false;

 history.unshift(crashPoint.toFixed(2));
 updateHistory();
}

function cashOut(){
 if(!running) return;

 let bet=parseInt(document.getElementById("bet").value);
 let win=Math.floor(bet*multi);

 balance+=win;
 updateBalance();

 running=false;
 clearInterval(interval);
}

function updateHistory(){
 let html="";
 history.slice(0,10).forEach(v=>{
  let c=v<2?"low":v<3?"mid":"high";
  html+=`<span class="${c}">${v}x</span>`;
 });
 document.getElementById("history").innerHTML=html;
}

// FAKE FEED
const names=["Rizky","Andi","Budi","Doni","Fajar"];

setInterval(()=>{
 let n=names[Math.floor(Math.random()*names.length)];
 let v=(Math.random()*3+1).toFixed(2);
 document.getElementById("feed").innerText=
  n+" cash out "+v+"x";
},2000);

</script>

</body>
</html>
