<!DOCTYPE html>
<html>
<head>
  <title>Crash Leaderboard</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { font-size: 50px; }

    canvas {
      background: black;
      border: 2px solid #444;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    .start { background: #16a34a; }
    .cash { background: #f59e0b; }

    #leaderboard {
      margin-top: 20px;
      text-align: left;
      display: inline-block;
    }
  </style>
</head>
<body>

<h2>💥 Crash Game Leaderboard</h2>

<input id="username" placeholder="Username">
<button onclick="saveUser()">Masuk</button>

<h1 id="multi">1.00x</h1>

<canvas id="graph" width="320" height="200"></canvas><br>

<input type="number" id="bet" value="10">
<input type="number" id="auto" placeholder="Auto cashout">

<br>

<button class="start" onclick="startGame()">START</button>
<button class="cash" onclick="cashOut()">CASH OUT</button>

<h3 id="result"></h3>
<h3 id="balance"></h3>

<div id="leaderboard"></div>

<script>
let username = localStorage.getItem("username") || "Guest";
let balance = parseInt(localStorage.getItem("balance") || 100);
let leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]");

let multi = 1;
let running = false;
let crashPoint = 0;
let interval;

const ctx = document.getElementById("graph").getContext("2d");

updateBalance();
updateLeaderboard();

function saveUser() {
  username = document.getElementById("username").value || "Guest";
  localStorage.setItem("username", username);
}

function updateBalance() {
  document.getElementById("balance").innerText =
    "Balance: " + balance;
  localStorage.setItem("balance", balance);
}

function resetGraph() {
  ctx.clearRect(0, 0, 320, 200);
  ctx.beginPath();
  ctx.moveTo(0, 200);
}

function startGame() {
  if (running) return;

  let bet = parseInt(document.getElementById("bet").value);
  if (balance < bet) return alert("Saldo kurang");

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;

  crashPoint = Math.random() * 5 + 1;

  resetGraph();
  document.getElementById("result").innerText = "";

  let x = 0;

  interval = setInterval(() => {
    if (!running) return;

    multi *= 1.02;
    document.getElementById("multi").innerText =
      multi.toFixed(2) + "x";

    ctx.lineTo(x, 200 - multi * 15);
    ctx.strokeStyle = "#22c55e";
    ctx.stroke();
    x += 2;

    let auto = parseFloat(document.getElementById("auto").value);
    if (auto && multi >= auto) cashOut();

    if (multi >= crashPoint) {
      crash();
      clearInterval(interval);
    }

  }, 60);
}

function crash() {
  document.getElementById("multi").innerText = "💥 CRASH!";
  document.getElementById("result").innerText = "Kalah!";
  running = false;
}

function cashOut() {
  if (!running) return;

  let bet = parseInt(document.getElementById("bet").value);
  let win = Math.floor(bet * multi);

  balance += win;
  updateBalance();

  document.getElementById("result").innerText =
    "Menang: " + win;

  running = false;
  clearInterval(interval);

  saveScore(win);
}

function saveScore(win) {
  leaderboard.push({ name: username, score: win });
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard = leaderboard.slice(0,10);

  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
  updateLeaderboard();
}

function updateLeaderboard() {
  let html = "<h3>🏆 Leaderboard</h3>";

  leaderboard.forEach((p,i)=>{
    html += `<p>${i+1}. ${p.name} - ${p.score}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}
</script>

</body>
</html>
